<!DOCTYPE html>
<html>
<head>
    <title>Formulaire de demande d'événement</title>
</head>
<body>

<h1>Formulaire de demande d'événement</h1>

<form method="POST">

<label>Date de la demande :</label><br>
<input type="date" name="date_demande" value="" id="date_demande" readonly><br><br>

<label>Nom :</label><br>
<input type="text" name="nom" required><br><br>

<label>Prénom :</label><br>
<input type="text" name="prenom" required><br><br>

<label>Adresse mail du demandeur :</label><br>
<input type="email" name="email" required><br><br>

<label>Numéro de téléphone du demandeur :</label><br>
<input type="tel" name="telephone" required><br><br>

<label>Service demandeur :</label><br>
<input type="text" name="service" required><br><br>

<label>Nom de l'événement :</label><br>
<input type="text" name="evenement" required><br><br>

<label>Date souhaitée :</label><br>
<input type="date" name="date_souhaitee" required><br><br>

<label>Type de lieu souhaité :</label><br>
<input type="text" name="lieu"><br><br>

<label>Nombre de participants :</label><br>
<input type="number" name="participants"><br><br>

<label>Invités :</label><br>
<select name="invites">
    <option>Internes</option>
    <option>Externes</option>
    <option>Internes et externes</option>
</select><br><br>

<label>Centre de coût :</label><br>
<input type="text" name="centre_cout"><br><br>

<label>Budget estimé :</label><br>
<input type="number" name="budget"><br><br>

<button type="submit">
Envoyer la demande
</button>

</form>

<script>
    // Met automatiquement la date du jour
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date_demande').value = today;
</script>

</body>
</html>
